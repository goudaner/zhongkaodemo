<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>条形码扫描统计</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
header{background:#1677ff;color:#fff;padding:14px 16px;font-size:17px;font-weight:600;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.card{background:#fff;margin:12px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
#vwrap{position:relative;background:#000;display:none}
#vid{width:100%;display:block;max-height:300px;object-fit:cover}
.guide{position:absolute;inset:0;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sbox{width:78%;aspect-ratio:3/1;border:2px solid rgba(255,255,255,.45);border-radius:4px;position:relative}
.sline{position:absolute;left:0;right:0;height:2px;background:#ff4d4f;box-shadow:0 0 8px rgba(255,77,79,.8);animation:mv 1.8s ease-in-out infinite}
@keyframes mv{0%,100%{top:0}50%{top:100%}}
.cn{position:absolute;width:18px;height:18px;border-color:#1677ff;border-style:solid}
.cn.tl{top:-1px;left:-1px;border-width:3px 0 0 3px}.cn.tr{top:-1px;right:-1px;border-width:3px 3px 0 0}
.cn.bl{bottom:-1px;left:-1px;border-width:0 0 3px 3px}.cn.br{bottom:-1px;right:-1px;border-width:0 3px 3px 0}
#hbar{position:absolute;bottom:6px;left:0;right:0;text-align:center;color:rgba(255,255,255,.9);font-size:12px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.fl{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .08s}
.fl.on{opacity:.5}
#clayer{display:none;position:absolute;inset:0;background:rgba(0,0,0,.8);flex-direction:column;align-items:center;justify-content:center;z-index:20}
#clayer.show{display:flex}
#ccode{color:#fff;font-size:20px;font-weight:700;font-family:monospace;margin-bottom:6px;text-align:center;padding:0 16px;word-break:break-all}
#cfmt{color:rgba(255,255,255,.6);font-size:12px;margin-bottom:18px}
.crow{display:flex;gap:12px}
.crow button{padding:12px 28px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
#bok{background:#52c41a;color:#fff}
#bsk{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)!important}
.btns{padding:14px 16px;display:flex;gap:10px}
.btn{flex:1;padding:12px;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer}
.btn:active{opacity:.8;transform:scale(.97)}
.bp{background:#1677ff;color:#fff}.bd{background:#ff4d4f;color:#fff}
.minput{padding:0 16px 14px;display:flex;gap:8px}
.minput input{flex:1;padding:10px 12px;border:1px solid #d9d9d9;border-radius:8px;font-size:15px;outline:none}
.minput input:focus{border-color:#1677ff}
.minput button{padding:10px 16px;background:#1677ff;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer}
#notice{margin:0 12px 8px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
#notice.ok{background:#f6ffed;border-left:4px solid #52c41a;color:#389e0d}
#notice.warn{background:#fff7e6;border-left:4px solid #ffa940;color:#d46b08}
#notice.err{background:#fff1f0;border-left:4px solid #ff4d4f;color:#cf1322}
#lastscan{margin:0 12px 8px;padding:10px 14px;background:#e6f4ff;border-radius:8px;border-left:4px solid #1677ff;font-size:14px;color:#1677ff;display:none}
.sbar{margin:0 12px 10px;display:flex;gap:8px}
.sc{flex:1;background:#fff;border-radius:10px;padding:10px 14px;box-shadow:0 2px 6px rgba(0,0,0,.06);text-align:center}
.sn{font-size:26px;font-weight:700;color:#1677ff;line-height:1}
.sl{font-size:12px;color:#999;margin-top:4px}
.twrap{background:#fff;margin:0 12px 16px;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.thead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0}
.ttitle{font-size:15px;font-weight:600}
.abtns{display:flex;gap:6px}
.abtns button{padding:5px 12px;border:none;border-radius:6px;font-size:13px;cursor:pointer}
.bex{background:#52c41a;color:#fff}.bcl{background:#fff1f0;color:#ff4d4f;border:1px solid #ffccc7!important}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:600;color:#555;border-bottom:1px solid #f0f0f0;font-size:13px}
tbody tr{border-bottom:1px solid #f5f5f5}tbody tr:last-child{border-bottom:none}
tbody td{padding:10px 12px}
.tseq{color:#999;font-size:13px;width:36px}.tcode{font-family:monospace;font-size:13px;word-break:break-all}
.tcnt{text-align:center;width:56px}.tdel{width:36px;text-align:center}
.badge{display:inline-block;font-weight:700;border-radius:12px;padding:2px 10px;font-size:13px}
.b1{background:#e6f4ff;color:#1677ff}.bn{background:#fff7e6;color:#d46b08}
.dbtn{background:none;border:none;color:#ff4d4f;font-size:18px;cursor:pointer;padding:2px 4px}
.etip{padding:40px;text-align:center;color:#bbb;font-size:14px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<header>📦 条形码扫描统计</header>
<div id="notice"></div>
<div class="card">
  <div id="vwrap">
    <video id="vid" autoplay playsinline muted></video>
    <div class="guide">
      <div class="sbox">
        <div class="sline"></div>
        <div class="cn tl"></div><div class="cn tr"></div>
        <div class="cn bl"></div><div class="cn br"></div>
      </div>
    </div>
    <div id="hbar">将条形码对准扫描框</div>
    <div class="fl" id="fl"></div>
    <div id="clayer">
      <div id="ccode"></div>
      <div id="cfmt"></div>
      <div class="crow">
        <button id="bok" onclick="confirmOk()">✅ 记录</button>
        <button id="bsk" onclick="confirmSkip()">跳过</button>
      </div>
    </div>
  </div>
  <div class="btns">
    <button class="btn bp" id="bstart" onclick="startScan()">📷 开始扫描</button>
    <button class="btn bd" id="bstop" onclick="stopScan()" style="display:none">⏹ 停止</button>
  </div>
  <div class="minput">
    <input type="text" id="mc" placeholder="手动输入条码（回车确认）" onkeydown="if(event.key==='Enter')addManual()">
    <button onclick="addManual()">添加</button>
  </div>
</div>
<div id="lastscan"></div>
<div class="sbar">
  <div class="sc"><div class="sn" id="tscan">0</div><div class="sl">总扫描次数</div></div>
  <div class="sc"><div class="sn" id="ucnt">0</div><div class="sl">不同条码数</div></div>
</div>
<div class="twrap">
  <div class="thead">
    <span class="ttitle">📋 扫描记录</span>
    <div class="abtns">
      <button class="bex" onclick="exportExcel()">导出 Excel</button>
      <button class="bcl" onclick="clearAll()">清空</button>
    </div>
  </div>
  <div id="tbody"><div class="etip">还没有扫描记录，点击「开始扫描」吧</div></div>
</div>
<div class="toast" id="toast"></div>
<canvas id="offscreen" style="display:none"></canvas>

<script>
var bmap=new Map(),total=0,vs=null,det=null,pcode=null,paused=false,looping=false;

function notice(type,msg){
  var el=document.getElementById('notice');
  el.className=type; el.textContent=msg; el.style.display=msg?'block':'none';
}

async function startScan(){
  if(!('BarcodeDetector' in window)){
    notice('err','❌ 此浏览器不支持条码识别，请使用 iOS Safari 17+ 或 Android Chrome');
    return;
  }
  try{
    var fmts=await BarcodeDetector.getSupportedFormats();
    det=new BarcodeDetector({formats:fmts});
    notice('ok','✅ 已就绪，支持格式：'+fmts.join(', '));
  }catch(e){
    notice('err','❌ 初始化失败：'+e.message); return;
  }
  try{
    vs=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
    });
  }catch(e){
    var m=e.name==='NotAllowedError'?'请在弹窗中允许摄像头权限':
           e.name==='NotFoundError'?'未找到摄像头':'摄像头错误：'+e.message;
    notice('err','❌ '+m); return;
  }
  var vid=document.getElementById('vid');
  vid.srcObject=vs; await vid.play();
  document.getElementById('vwrap').style.display='block';
  document.getElementById('bstart').style.display='none';
  document.getElementById('bstop').style.display='';
  paused=false; looping=true;
  doLoop(vid);
}

async function doLoop(vid){
  var cv=document.getElementById('offscreen'),ctx=cv.getContext('2d');
  while(looping && vs){
    if(!paused && vid.readyState>=2 && vid.videoWidth>0){
      cv.width=vid.videoWidth; cv.height=vid.videoHeight;
      ctx.drawImage(vid,0,0);
      try{
        var res=await det.detect(cv);
        if(res.length>0 && !paused){
          var r=res[0];
          flash(); vibrate();
          showConfirm(r.rawValue, r.format);
          return;
        }
      }catch(e){}
    }
    await sleep(150);
  }
}

function showConfirm(code,fmt){
  paused=true; pcode=code;
  document.getElementById('ccode').textContent=code;
  document.getElementById('cfmt').textContent=fmt?'格式：'+fmt:'';
  document.getElementById('clayer').classList.add('show');
}
function confirmOk(){ if(pcode)addBarcode(pcode); hideConfirm(); }
function confirmSkip(){ hideConfirm(); }
function hideConfirm(){
  document.getElementById('clayer').classList.remove('show');
  pcode=null; paused=false;
  if(vs && looping) doLoop(document.getElementById('vid'));
}
function stopScan(){
  looping=false; paused=true;
  if(vs){vs.getTracks().forEach(function(t){t.stop();}); vs=null;}
  document.getElementById('vwrap').style.display='none';
  document.getElementById('bstart').style.display='';
  document.getElementById('bstop').style.display='none';
  document.getElementById('clayer').classList.remove('show');
}

function addBarcode(code){
  code=code.trim(); if(!code)return;
  bmap.set(code,(bmap.get(code)||0)+1); total++;
  var el=document.getElementById('lastscan');
  el.style.display='block';
  el.innerHTML='✅ 已记录：<strong>'+esc(code)+'</strong>　累计：<strong>'+bmap.get(code)+'</strong>';
  render(); stats();
}
function addManual(){
  var inp=document.getElementById('mc'),code=inp.value.trim();
  if(!code)return; addBarcode(code); inp.value=''; toast('已添加：'+code);
}
function deleteEntry(code){
  total-=(bmap.get(code)||0); bmap.delete(code); render(); stats();
}
function clearAll(){
  if(!bmap.size)return;
  if(!confirm('确认清空所有记录？'))return;
  bmap.clear(); total=0; render(); stats();
  document.getElementById('lastscan').style.display='none';
}
function stats(){
  document.getElementById('tscan').textContent=total;
  document.getElementById('ucnt').textContent=bmap.size;
}
function render(){
  var c=document.getElementById('tbody');
  if(!bmap.size){c.innerHTML='<div class="etip">还没有扫描记录，点击「开始扫描」吧</div>';return;}
  var rows=[...bmap.entries()].map(function(e,i){
    var code=e[0],cnt=e[1];
    return '<tr><td class="tseq">'+(i+1)+'</td><td class="tcode">'+esc(code)+'</td><td class="tcnt"><span class="badge '+(cnt>1?'bn':'b1')+'">'+cnt+'</span></td><td class="tdel"><button class="dbtn" onclick=\'deleteEntry('+JSON.stringify(code)+')\'>×</button></td></tr>';
  }).join('');
  c.innerHTML='<table><thead><tr><th class="tseq">#</th><th>条形码</th><th class="tcnt">数量</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function exportExcel(){
  if(!bmap.size){toast('暂无数据');return;}
  var rows='<tr><th>序号</th><th>条形码</th><th>数量</th></tr>',i=1;
  bmap.forEach(function(cnt,code){rows+='<tr><td>'+i+'</td><td>'+esc(code)+'</td><td>'+cnt+'</td></tr>';i++;});
  var html='<html><head><meta charset="utf-8"></head><body><table border="1">'+rows+'</table></body></html>';
  var blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  var url=URL.createObjectURL(blob),now=new Date();
  var ts=now.getFullYear()+pad(now.getMonth()+1)+pad(now.getDate())+'_'+pad(now.getHours())+pad(now.getMinutes());
  var a=document.createElement('a');a.href=url;a.download='条形码统计_'+ts+'.xls';a.click();
  URL.revokeObjectURL(url); toast('已导出，WPS可直接打开');
}
function flash(){var el=document.getElementById('fl');el.classList.add('on');setTimeout(function(){el.classList.remove('on');},120);}
function vibrate(){if(navigator.vibrate)navigator.vibrate([80,40,80]);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pad(n){return String(n).padStart(2,'0');}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms);});}
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2500);}
render(); stats();
</script>
</body>
</html>
