<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>深圳中考志愿参考</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #f5f6fa; color: #333; }

  .header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: white; padding: 20px 16px 16px;
    text-align: center;
  }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header p { font-size: 12px; opacity: 0.85; margin-top: 4px; }

  .card {
    background: white; border-radius: 12px; margin: 12px;
    padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .card h2 { font-size: 15px; color: #1a73e8; margin-bottom: 12px; font-weight: 600; }

  .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .input-group label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
  .input-group input, .input-group select {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; font-size: 15px; outline: none;
    transition: border-color 0.2s;
  }
  .input-group input:focus, .input-group select:focus { border-color: #1a73e8; }

  .hukou-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .hukou-btn {
    flex: 1; padding: 10px; border: 1.5px solid #e0e0e0;
    border-radius: 8px; background: white; font-size: 14px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .hukou-btn.active { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; font-weight: 600; }

  .calc-tip {
    background: #fff8e1; border-radius: 8px; padding: 10px 12px;
    font-size: 12px; color: #795548; margin-top: 10px; line-height: 1.6;
  }
  .calc-tip strong { color: #e65100; }

  .predict-score {
    text-align: center; padding: 12px;
    background: linear-gradient(135deg, #e8f0fe, #f3e5f5);
    border-radius: 10px; margin-bottom: 10px;
  }
  .predict-score .num { font-size: 42px; font-weight: 700; color: #1a73e8; line-height: 1.1; }
  .predict-score .label { font-size: 12px; color: #666; margin-top: 2px; }
  .score-range { font-size: 12px; color: #888; margin-top: 4px; }

  .btn-primary {
    width: 100%; padding: 14px; background: #1a73e8; color: white;
    border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; margin-top: 12px; transition: background 0.2s;
  }
  .btn-primary:active { background: #1558b0; }

  .tier { margin-bottom: 8px; }
  .tier-header {
    display: flex; align-items: center; padding: 8px 12px;
    border-radius: 8px 8px 0 0; font-size: 13px; font-weight: 600;
  }
  .tier-chong .tier-header { background: #fce4ec; color: #c62828; }
  .tier-wen .tier-header  { background: #e8f5e9; color: #2e7d32; }
  .tier-bao .tier-header  { background: #e3f2fd; color: #1565c0; }

  .tier-badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; margin-right: 8px;
  }
  .tier-chong .tier-badge { background: #c62828; color: white; }
  .tier-wen .tier-badge   { background: #2e7d32; color: white; }
  .tier-bao .tier-badge   { background: #1565c0; color: white; }

  .school-list { border: 1px solid #eee; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
  .school-item {
    padding: 10px 12px; border-bottom: 1px solid #f5f5f5;
    cursor: pointer; transition: background 0.15s;
  }
  .school-item:last-child { border-bottom: none; }
  .school-item:active { background: #f5f5f5; }
  .school-top { display: flex; justify-content: space-between; align-items: center; }
  .school-name { font-size: 14px; font-weight: 500; }
  .school-score { font-size: 15px; font-weight: 700; color: #1a73e8; }
  .school-diff { font-size: 11px; color: #999; }
  .school-tags { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    font-size: 11px; padding: 1px 6px; border-radius: 4px;
    background: #f0f0f0; color: #666;
  }
  .tag.district { background: #e8f0fe; color: #1a73e8; }
  .tag.grade-A\\+ { background: #fce4ec; color: #c62828; }
  .tag.grade-A头 { background: #fff3e0; color: #e65100; }
  .tag.grade-A中 { background: #e8f5e9; color: #2e7d32; }
  .tag.grade-A底 { background: #e3f2fd; color: #1565c0; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100; align-items: flex-end;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: white; width: 100%; border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px; max-height: 80vh; overflow-y: auto;
  }
  .modal h3 { font-size: 17px; font-weight: 700; margin-bottom: 12px; }
  .modal-close { float: right; font-size: 20px; cursor: pointer; color: #999; margin-top: -4px; }
  .detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: #888; width: 80px; flex-shrink: 0; }
  .detail-value { color: #333; flex: 1; }

  .no-result { text-align: center; padding: 30px; color: #999; font-size: 14px; }

  .tips-text { font-size: 12px; color: #999; text-align: center; margin: 8px 0; line-height: 1.6; }
</style>

</head>
<body>

<div class="header">
  <h1>🎓 深圳中考志愿参考</h1>
  <p>数据来源：2025年整理 · 仅供参考</p>
</div>

<!-- 输入区 -->
<div class="card">
  <h2>📝 输入成绩</h2>
  
  <div class="hukou-row">
    <button class="hukou-btn active" onclick="setHukou('ac')" id="btn-ac">🏠 深户 (A类)</button>
    <button class="hukou-btn" onclick="setHukou('d')" id="btn-d">📋 非深户 (D类)</button>
  </div>

  <div class="score-grid">
    <div class="input-group">
      <label>模考总分（文化课）</label>
      <input type="number" id="mock-score" placeholder="如 510" min="0" max="540" oninput="onScoreInput()">
    </div>
    <div class="input-group">
      <label>成绩类型</label>
      <select id="score-type" onchange="onScoreInput()">
        <option value="yi">一模成绩</option>
        <option value="er">二模成绩</option>
        <option value="san">三模成绩</option>
        <option value="qimo">期末成绩</option>
      </select>
    </div>
    <div class="input-group">
      <label>体育分（满50）</label>
      <input type="number" id="pe-score" placeholder="45" min="0" max="50" value="45" oninput="onScoreInput()">
    </div>
    <div class="input-group">
      <label>理化实验操作（满20）</label>
      <input type="number" id="extra-score" placeholder="18" min="0" max="20" value="18" oninput="onScoreInput()">
    </div>
  </div>

  <div class="calc-tip" id="calc-tip">
    💡 深圳中考满分630分 = 文化课560（语120+数100+英100+理化120+历史70+政治50）+ 体育50 + 理化实验20<br>
    模考一般只考文化课部分，加上其余科目才是中考总分
  </div>

  <button class="btn-primary" onclick="doSearch()">🔍 查看匹配学校</button>
</div>

<!-- 预测分数展示 -->
<div class="card" id="result-card" style="margin-top:12px">
  <h2>🎯 预测结果</h2>
  <div class="predict-score">
    <div class="num" id="predict-num">--</div>
    <div class="label">预估中考分数</div>
    <div class="score-range" id="score-range"></div>
  </div>

  <div id="tier-chong" class="tier">
    <div class="tier-header tier-chong">
      <span class="tier-badge tier-chong">冲</span> 可以冲一冲（分数差 0~10分）
    </div>
    <div class="school-list" id="list-chong"></div>
  </div>

  <div id="tier-wen" class="tier">
    <div class="tier-header tier-wen">
      <span class="tier-badge tier-wen">稳</span> 比较稳（分数差 10~25分）
    </div>
    <div class="school-list" id="list-wen"></div>
  </div>

  <div id="tier-bao" class="tier">
    <div class="tier-header tier-bao">
      <span class="tier-badge tier-bao">保</span> 保底选择（分数差 25~50分）
    </div>
    <div class="school-list" id="list-bao"></div>
  </div>

  <p class="tips-text">⚠️ 以上为参考，实际录取以官方为准<br>点击学校可查看详情</p>
</div>

<!-- 学校详情 Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <span class="modal-close" onclick="closeModalDirect()">×</span>
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
  </div>
</div>

  document.getElementById('btn-d').classList.toggle('active', type === 'd');
}

// 模考 → 中考 换算系数（根据考试类型微调）
const TYPE_BONUS = { qimo: -5, yi: -5, er: 0, san: 5 };

function onScoreInput() {
  const mock = parseInt(document.getElementById('mock-score').value) || 0;
  if (!mock) return;
  const pe = parseInt(document.getElementById('pe-score').value) || 45;
  const extra = parseInt(document.getElementById('extra-score').value) || 18;
  const type = document.getElementById('score-type').value;
  const bonus = TYPE_BONUS[type] || 0;
  const predict = mock + pe + extra + bonus;
  document.getElementById('calc-tip').innerHTML =
    `💡 预估中考分：<strong style="color:#1a73e8;font-size:16px">${predict}分</strong>（文化课${mock} + 体育${pe} + 实验素质${extra}${bonus >= 0 ? '+' : ''}${bonus}）<br>
    <span style="color:#999">二模最接近中考难度，三模略偏易所以略加分</span>`;
}

function doSearch() {
  const mock = parseInt(document.getElementById('mock-score').value);
  if (!mock || mock < 100) {
    alert('请输入有效的模考文化课分数（100-560分）');
    return;
  }
  const pe = parseInt(document.getElementById('pe-score').value) || 45;
  const extra = parseInt(document.getElementById('extra-score').value) || 18;
  const type = document.getElementById('score-type').value;
  const bonus = TYPE_BONUS[type] || 0;
  const predict = mock + pe + extra + bonus;

  document.getElementById('predict-num').textContent = predict;
  document.getElementById('score-range').textContent =
    `参考范围：${predict - 8} ~ ${predict + 8} 分`;

  const scoreKey = hukou === 'ac' ? 'score_ac' : 'score_d';
  
  const chong = [], wen = [], bao = [];
  
  SCHOOLS.forEach(s => {
    const sScore = s[scoreKey];
    if (!sScore) return;
    const diff = predict - sScore;
    const item = { ...s, diff };
    if (diff >= 0 && diff < 10) chong.push(item);
    else if (diff >= 10 && diff < 25) wen.push(item);
    else if (diff >= 25 && diff < 50) bao.push(item);
  });

  renderList('list-chong', chong);
  renderList('list-wen', wen);
  renderList('list-bao', bao);

  window.scrollTo({top: document.getElementById('result-card').offsetTop - 10, behavior: 'smooth'});
}

function renderList(id, items) {
  const el = document.getElementById(id);
  if (items.length === 0) {
    el.innerHTML = '<div class="no-result">暂无匹配学校</div>';
    return;
  }
  items.sort((a, b) => b[hukou === 'ac' ? 'score_ac' : 'score_d'] - a[hukou === 'ac' ? 'score_ac' : 'score_d']);
  el.innerHTML = items.map(s => {
    const score = hukou === 'ac' ? s.score_ac : s.score_d;
    const gradeClass = 'grade-' + s.grade.replace(/[（）()]/g, '').substring(0, 2);
    return `<div class="school-item" onclick="showDetail(${s.rank_ac || 0}, '${escape(JSON.stringify(s))}')">
      <div class="school-top">
        <span class="school-name">${s.name}</span>
        <span>
          <span class="school-score">${score}分</span>
          <span class="school-diff"> +${s.diff}分</span>
        </span>
      </div>
      <div class="school-tags">
        <span class="tag ${gradeClass}">${s.grade}</span>
        <span class="tag district">${s.district}</span>
        ${s.affiliation ? `<span class="tag">${s.affiliation}</span>` : ''}
        ${s.total ? `<span class="tag">招${s.total}人</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function showDetail(rank, encoded) {
  const s = JSON.parse(unescape(encoded));
  document.getElementById('modal-title').textContent = s.name;
  const rows = [
    ['等级', s.grade],
    ['深户录取分', s.score_ac ? s.score_ac + '分' : '-'],
    ['非深录取分', s.score_d ? s.score_d + '分' : '-'],
    ['所在区', s.district],
    ['行政归属', s.affiliation],
    ['位置', s.location === '中' ? '市中心' : s.location === '西' ? '西部' : s.location === '东' ? '东部' : s.location],
    ['招生人数', s.total ? s.total + '人' : '-'],
    ['宿舍', s.dorm || '-'],
    ['学校特色', s.feature || '-'],
  ];
  document.getElementById('modal-body').innerHTML = rows.map(([k, v]) =>
    `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${v}</span></div>`
  ).join('');
  document.getElementById('modal').classList.add('show');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal').classList.remove('show');
}
</script>
